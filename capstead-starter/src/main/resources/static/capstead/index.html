<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Capstead — Capability Dashboard</title>
    <style>
        :root { --bg:#0f1420; --card:#171d2b; --line:#26304a; --text:#e6ebf5; --muted:#8b97b3; --ok:#37d67a; --warn:#f6c343; --bad:#f05a5a; --accent:#5b8cff; }
        * { box-sizing: border-box; }
        body { margin:0; background:var(--bg); color:var(--text); font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
        header { padding:24px 32px; border-bottom:1px solid var(--line); display:flex; align-items:baseline; gap:16px; }
        header h1 { margin:0; font-size:20px; letter-spacing:.3px; }
        header .sub { color:var(--muted); font-size:13px; }
        header .spacer { flex:1; }
        button { background:var(--card); color:var(--text); border:1px solid var(--line); border-radius:8px; padding:8px 14px; cursor:pointer; }
        button:hover { border-color:var(--accent); }
        main { padding:24px 32px; }
        .cards { display:flex; gap:16px; flex-wrap:wrap; margin-bottom:24px; }
        .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px 20px; min-width:180px; }
        .card .label { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.5px; }
        .card .value { font-size:26px; font-weight:600; margin-top:6px; }
        .card .value.sm { font-size:20px; }
        .card.click { cursor:pointer; transition:border-color .15s, box-shadow .15s; }
        .card.click:hover { border-color:var(--accent); }
        .card.active { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent) inset; }
        table { width:100%; border-collapse:collapse; background:var(--card); border:1px solid var(--line); border-radius:12px; overflow:hidden; }
        th, td { text-align:left; padding:12px 16px; border-bottom:1px solid var(--line); white-space:nowrap; }
        th { color:var(--muted); font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:.5px; }
        tr:last-child td { border-bottom:none; }
        td.num { text-align:right; font-variant-numeric:tabular-nums; }
        .pill { display:inline-block; padding:2px 10px; border-radius:999px; font-size:12px; font-weight:600; }
        .pill.ok { background:rgba(55,214,122,.15); color:var(--ok); }
        .pill.warn { background:rgba(246,195,67,.15); color:var(--warn); }
        .pill.bad { background:rgba(240,90,90,.15); color:var(--bad); }
        .pill.idle { background:rgba(139,151,179,.15); color:var(--muted); }
        .muted { color:var(--muted); }
        .empty { color:var(--muted); padding:40px; text-align:center; }
        code { background:#0c1119; padding:2px 6px; border-radius:6px; color:var(--accent); }
        tr.clickable { cursor:pointer; }
        tr.clickable:hover td { background:rgba(91,140,255,.07); }
        .tag { display:inline-block; padding:1px 8px; margin:2px 4px 2px 0; border-radius:6px; font-size:11px; background:rgba(91,140,255,.14); color:var(--accent); white-space:nowrap; }
        .back { margin-bottom:16px; }
        .detail h2 { font-size:18px; margin:0 0 2px; }
        .detail .sub { color:var(--muted); margin-bottom:16px; }
    </style>
</head>
<body>
<header>
    <h1>Capstead</h1>
    <span class="sub">Capability Dashboard</span>
    <span class="spacer"></span>
    <button id="refresh">Refresh</button>
</header>
<main>
    <div class="cards" id="summary"></div>
    <div class="cards" id="domains"></div>
    <div id="content"></div>
</main>
<script>
    // Actuator endpoints must be exposed, e.g.:
    // management.endpoints.web.exposure.include=capabilities,capabilityscorecard
    const BASE = (location.pathname.replace(/\/capstead\/?$/, '') || '') ;
    const CATALOG_URL = BASE + '/actuator/capabilities';
    const SCORECARD_URL = BASE + '/actuator/capabilityscorecard';
    const EXECUTIONS_URL = BASE + '/actuator/capabilityexecutions';
    const PIPELINES_URL = BASE + '/actuator/capabilitypipelines';

    const fmtInt = n => (n ?? 0).toLocaleString();
    const fmtMs = n => (n ?? 0).toFixed(0) + ' ms';
    const fmtDur = ms => {
        ms = ms ?? 0;
        if (ms < 1000) return ms.toFixed(0) + ' ms';
        const s = ms / 1000;
        if (s < 60) return s.toFixed(1) + ' s';
        const m = Math.floor(s / 60);
        if (m < 60) return m + 'm ' + Math.round(s % 60) + 's';
        return Math.floor(m / 60) + 'h ' + (m % 60) + 'm';
    };
    const fmtPct = r => ((r ?? 1) * 100).toFixed(1) + '%';
    const fmtUsd = n => '$' + Number(n ?? 0).toFixed(4);
    const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    const shortId = id => id ? String(id).slice(0, 8) : '';
    const modelTags = models => (!models || !models.length)
        ? '<span class="muted">\u2014</span>'
        : models.map(m => `<span class="tag">${esc(m)}</span>`).join('');

    let STATE = { scorecards: [], catalog: [], pipelines: [], domain: null };

    function domainSummary(catalog) {
        const counts = {};
        (catalog || []).forEach(m => {
            const d = (m.domain && String(m.domain).trim()) ? m.domain : 'Ungrouped';
            counts[d] = (counts[d] || 0) + 1;
        });
        return Object.keys(counts).sort((a, b) => counts[b] - counts[a]).map(d => ({ domain: d, count: counts[d] }));
    }

    function renderDomains(catalog) {
        const el = document.getElementById('domains');
        const groups = domainSummary(catalog);
        if (!groups.length) { el.innerHTML = ''; return; }
        el.innerHTML = groups.map(g => {
            const active = STATE.domain === g.domain ? ' active' : '';
            const noun = g.count === 1 ? 'Capability' : 'Capabilities';
            return `<div class="card click domain${active}" data-domain="${esc(g.domain)}">`
                + `<div class="label">${esc(g.domain)}</div>`
                + `<div class="value sm">${g.count} ${noun}</div></div>`;
        }).join('');
        el.querySelectorAll('.card.domain').forEach(c =>
            c.addEventListener('click', () => {
                const d = c.getAttribute('data-domain');
                STATE.domain = (STATE.domain === d) ? null : d;
                render(STATE.scorecards, STATE.catalog);
            }));
    }

    function health(rate) {
        if (rate >= 0.99) return '<span class="pill ok">Healthy</span>';
        if (rate >= 0.90) return '<span class="pill warn">Degraded</span>';
        return '<span class="pill bad">Unhealthy</span>';
    }

    async function safeJson(url) {
        try { const r = await fetch(url); if (!r.ok) return null; return await r.json(); }
        catch (e) { return null; }
    }

    function indexMeta(catalog) {
        const map = {};
        (catalog || []).forEach(m => { map[(m.name || '') + '@' + (m.version || '')] = m; });
        return map;
    }

    function renderPipelines(pipelines) {
        const visible = STATE.domain
            ? (pipelines || []).filter(p => ((p.domain && String(p.domain).trim()) ? p.domain : 'Ungrouped') === STATE.domain)
            : (pipelines || []);
        if (!visible.length) return '';
        const dash = '<span class="muted">\u2014</span>';
        const rows = visible.map(p => `<tr class="clickable pipeline" data-pipeline="${esc(p.name)}">
            <td>${esc(p.name)}</td>
            <td>${p.owner ? esc(p.owner) : dash}</td>
            <td>${p.domain ? esc(p.domain) : dash}</td>
            <td class="muted">${(p.steps || []).map(esc).join(' \u2192 ')}</td>
            <td class="num">${fmtInt(p.runs)}</td>
            <td class="num">${p.runs ? fmtPct(p.successRate) : dash}</td>
            <td class="num">${p.runs ? fmtDur(p.avgWallTimeMs) : dash}</td>
            <td class="num">${p.runs ? fmtUsd(p.avgCost) : dash}</td>
            <td class="num">${p.runs ? fmtUsd(p.totalCost) : dash}</td>
            <td>${p.runs ? health(p.successRate) : '<span class="pill idle">No runs</span>'}</td>
        </tr>`).join('');
        return `<h3 style="margin:0 0 10px;font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;">Pipelines</h3>
        <table style="margin-bottom:24px;">
            <thead><tr>
                <th>Pipeline</th><th>Owner</th><th>Domain</th><th>Steps</th>
                <th class="num">Runs</th><th class="num">Success</th><th class="num">Avg Wall Time</th>
                <th class="num">Avg Cost</th><th class="num">Total Cost</th><th>Health</th>
            </tr></thead>
            <tbody>${rows}</tbody>
        </table>`;
    }

    function render(scorecards, catalog) {
        const content = document.getElementById('content');
        const summary = document.getElementById('summary');
        renderDomains(catalog);

        // Merge: show EVERY registered capability (catalog), attaching its scorecard when it has executed.
        const scoreByKey = {};
        (scorecards || []).forEach(s => { scoreByKey[(s.name || '') + '@' + (s.version || '')] = s; });
        const rowsData = [];
        (catalog || []).forEach(m => {
            const key = (m.name || '') + '@' + (m.version || '');
            rowsData.push({ meta: m, score: scoreByKey[key] || null, name: m.name, version: m.version,
                domain: (m.domain && String(m.domain).trim()) ? m.domain : 'Ungrouped' });
            delete scoreByKey[key];
        });
        Object.values(scoreByKey).forEach(s => rowsData.push({ meta: {}, score: s, name: s.name, version: s.version,
            domain: 'Ungrouped' }));

        if (rowsData.length === 0) {
            summary.innerHTML = '';
            content.innerHTML = '<div class="empty">No capabilities registered yet. '
                + 'Add a <code>@Capability</code> and refresh.</div>';
            return;
        }

        const visible = STATE.domain ? rowsData.filter(r => r.domain === STATE.domain) : rowsData;
        if (visible.length === 0) {
            summary.innerHTML = '';
            content.innerHTML = '<div class="empty">No capabilities in <code>' + esc(STATE.domain) + '</code>.</div>';
            return;
        }

        const executed = visible.filter(r => r.score);
        const totalCalls = executed.reduce((a, r) => a + (r.score.invocations || 0), 0);
        const totalCost = executed.reduce((a, r) => a + Number(r.score.totalCost || 0), 0);
        const avgSuccess = executed.length
            ? executed.reduce((a, r) => a + (r.score.successRate || 0), 0) / executed.length : 1;

        summary.innerHTML = `
            <div class="card"><div class="label">Capabilities</div><div class="value">${visible.length}</div></div>
            <div class="card"><div class="label">Total Invocations</div><div class="value">${fmtInt(totalCalls)}</div></div>
            <div class="card"><div class="label">Avg Success</div><div class="value">${executed.length ? fmtPct(avgSuccess) : '\u2014'}</div></div>
            <div class="card"><div class="label">Total Cost</div><div class="value">${fmtUsd(totalCost)}</div></div>`;

        const dash = '<span class="muted">\u2014</span>';
        const rows = visible.map(r => {
            const s = r.score;
            const m = r.meta || {};
            const ownerCell = m.owner ? esc(m.owner) : dash;
            const domainCell = m.domain ? esc(m.domain) : dash;
            if (!s) {
                return `<tr class="clickable" data-name="${esc(r.name)}">
                    <td>${esc(r.name)}</td>
                    <td class="muted">v${esc(r.version)}</td>
                    <td>${ownerCell}</td>
                    <td>${domainCell}</td>
                    <td>${dash}</td>
                    <td class="num">${dash}</td><td class="num">${dash}</td><td class="num">${dash}</td>
                    <td class="num">${dash}</td><td class="num">${dash}</td><td class="num">${dash}</td>
                    <td><span class="pill idle">No runs</span></td>
                </tr>`;
            }
            const tokens = (s.avgInputTokens || 0) + (s.avgOutputTokens || 0);
            return `<tr class="clickable" data-name="${esc(r.name)}">
                <td>${esc(r.name)}</td>
                <td class="muted">v${esc(r.version)}</td>
                <td>${ownerCell}</td>
                <td>${domainCell}</td>
                <td>${modelTags(s.models)}</td>
                <td class="num">${fmtInt(s.invocations)}</td>
                <td class="num">${fmtPct(s.successRate)}</td>
                <td class="num">${fmtMs(s.avgLatencyMs)}</td>
                <td class="num">${fmtInt(Math.round(tokens))}</td>
                <td class="num">${fmtUsd(s.avgCost)}</td>
                <td class="num">${fmtUsd(s.totalCost)}</td>
                <td>${health(s.successRate)}</td>
            </tr>`;
        }).join('');

        content.innerHTML = renderPipelines(STATE.pipelines) + `<table>
            <thead><tr>
                <th>Capability</th><th>Version</th><th>Owner</th><th>Domain</th><th>Models</th>
                <th class="num">Calls</th><th class="num">Success</th><th class="num">Avg Latency</th>
                <th class="num">Avg Tokens</th><th class="num">Avg Cost</th><th class="num">Total Cost</th><th>Health</th>
            </tr></thead>
            <tbody>${rows}</tbody>
        </table>`;

        content.querySelectorAll('tr.clickable.pipeline').forEach(tr =>
            tr.addEventListener('click', () => openPipelineDetail(tr.getAttribute('data-pipeline'))));
        content.querySelectorAll('tr.clickable:not(.pipeline)').forEach(tr =>
            tr.addEventListener('click', () => openDetail(tr.getAttribute('data-name'))));
    }

    function execModels(view) {
        const out = [];
        (view.modelInvocations || []).forEach(mi => { if (mi.model && !out.includes(mi.model)) out.push(mi.model); });
        if (!out.length && view.model) out.push(view.model);
        return out;
    }

    async function openDetail(name) {
        const content = document.getElementById('content');
        document.getElementById('summary').innerHTML = '';
        content.innerHTML = '<div class="empty">Loading\u2026</div>';
        const execs = await safeJson(SCORECARD_URL + '/' + encodeURIComponent(name));
        if (!execs) { content.innerHTML = '<div class="empty">Could not load executions for ' + esc(name) + '.</div>'; return; }
        const rows = execs.map(v => `<tr>
            <td>${esc(new Date(v.startedAt).toLocaleString())}</td>
            <td class="num">${fmtMs(v.durationMs)}</td>
            <td>${v.success ? '<span class="pill ok">ok</span>' : '<span class="pill bad">' + esc(v.errorType || 'error') + '</span>'}</td>
            <td>${modelTags(execModels(v))}</td>
            <td class="num">${fmtInt(v.inputTokens)} / ${fmtInt(v.outputTokens)}</td>
            <td class="num">${v.estimatedCost != null ? fmtUsd(v.estimatedCost) : '<span class="muted">\u2014</span>'}</td>
            <td class="muted">${v.parentExecutionId ? 'child of ' + shortId(v.parentExecutionId) : '<code>' + shortId(v.executionId) + '</code>'}</td>
        </tr>`).join('');
        const cap = (STATE.catalog || []).find(m => (m.name || '') === name) || {};
        const metaBits = [];
        if (cap.domain) metaBits.push(esc(cap.domain));
        if (cap.owner) metaBits.push('owned by ' + esc(cap.owner));
        metaBits.push(esc(cap.version ? 'v' + cap.version : ''));
        const subtitle = execs.length
            ? execs.length + ' recent execution(s)'
            : 'No executions recorded yet \u2014 invoke this capability to see runs.';
        content.innerHTML = `
            <button class="back" id="back">\u2190 All capabilities</button>
            <div class="detail">
                <h2>${esc(name)}</h2>
                <div class="sub">${metaBits.filter(Boolean).join(' \u00b7 ')}${metaBits.filter(Boolean).length ? ' \u00b7 ' : ''}${subtitle}</div>
                <table>
                    <thead><tr>
                        <th>Started</th><th class="num">Duration</th><th>Outcome</th><th>Model(s)</th>
                        <th class="num">In / Out Tokens</th><th class="num">Cost</th><th>Execution</th>
                    </tr></thead>
                    <tbody>${rows || '<tr><td colspan="7" class="muted">No executions recorded yet.</td></tr>'}</tbody>
                </table>
            </div>`;
        document.getElementById('back').addEventListener('click', load);
    }

    async function openPipelineDetail(name) {
        const content = document.getElementById('content');
        document.getElementById('summary').innerHTML = '';
        content.innerHTML = '<div class="empty">Loading\u2026</div>';
        const runs = await safeJson(PIPELINES_URL + '/' + encodeURIComponent(name));
        if (runs === null) { content.innerHTML = '<div class="empty">Could not load runs for ' + esc(name) + '.</div>'; return; }
        const meta = (STATE.pipelines || []).find(p => p.name === name) || {};
        const runBlocks = runs.map(r => {
            const stepRows = (r.steps || []).map(v => `<tr>
                <td>${esc(v.capabilityName)}</td>
                <td>${esc(new Date(v.startedAt).toLocaleTimeString())}</td>
                <td class="num">${fmtDur(v.durationMs)}</td>
                <td>${v.success ? '<span class="pill ok">ok</span>' : '<span class="pill bad">' + esc(v.errorType || 'error') + '</span>'}</td>
                <td>${modelTags(execModels(v))}</td>
                <td class="num">${fmtInt(v.inputTokens)} / ${fmtInt(v.outputTokens)}</td>
                <td class="num">${v.estimatedCost != null ? fmtUsd(v.estimatedCost) : '<span class="muted">\u2014</span>'}</td>
            </tr>`).join('');
            return `<div class="detail" style="margin-bottom:24px;">
                <h2 style="font-size:15px;">${esc(new Date(r.startedAt).toLocaleString())}
                    ${r.success ? '<span class="pill ok">ok</span>' : '<span class="pill bad">failed</span>'}</h2>
                <div class="sub">wall time ${fmtDur(r.wallTimeMs)} \u00b7 ${(r.steps || []).length} step(s)
                    \u00b7 ${fmtInt(r.inputTokens)} / ${fmtInt(r.outputTokens)} tokens
                    ${r.totalCost != null ? '\u00b7 ' + fmtUsd(r.totalCost) : ''}</div>
                <table>
                    <thead><tr>
                        <th>Step</th><th>Started</th><th class="num">Duration</th><th>Outcome</th>
                        <th>Model(s)</th><th class="num">In / Out Tokens</th><th class="num">Cost</th>
                    </tr></thead>
                    <tbody>${stepRows}</tbody>
                </table>
            </div>`;
        }).join('');
        const metaBits = [];
        if (meta.domain) metaBits.push(esc(meta.domain));
        if (meta.owner) metaBits.push('owned by ' + esc(meta.owner));
        metaBits.push((meta.steps || []).map(esc).join(' \u2192 '));
        content.innerHTML = `
            <button class="back" id="back">\u2190 All capabilities</button>
            <div class="detail">
                <h2>${esc(name)}</h2>
                <div class="sub">${metaBits.filter(Boolean).join(' \u00b7 ')}</div>
            </div>
            ${runBlocks || '<div class="empty">No runs assembled yet \u2014 run the pipeline\u2019s first capability to see it here.</div>'}`;
        document.getElementById('back').addEventListener('click', load);
    }

    async function load() {
        const [scorecards, catalog, pipelines] = await Promise.all([
            safeJson(SCORECARD_URL), safeJson(CATALOG_URL), safeJson(PIPELINES_URL)]);
        if (scorecards === null) {
            document.getElementById('content').innerHTML =
                '<div class="empty">Could not reach <code>/actuator/capabilityscorecard</code>. '
                + 'Ensure the endpoint is exposed via '
                + '<code>management.endpoints.web.exposure.include</code>.</div>';
            return;
        }
        STATE.scorecards = scorecards || [];
        STATE.catalog = catalog || [];
        STATE.pipelines = pipelines || [];
        render(STATE.scorecards, STATE.catalog);
    }

    document.getElementById('refresh').addEventListener('click', load);
    load();
</script>
</body>
</html>
